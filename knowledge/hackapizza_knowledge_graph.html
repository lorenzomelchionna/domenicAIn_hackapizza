<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hackapizza 2.0 - Knowledge Graph</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --card: #334155;
            --text: #f1f5f9;
            --dim: #94a3b8;
            --accent: #38bdf8;
            --success: #10b981;
            --warning: #f59e0b;
            --error: #ef4444;
            --purple: #a78bfa;
            --orange: #fb923c;
            --pink: #f472b6;
            --teal: #2dd4bf;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
        }

        header {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            background: rgba(15, 23, 42, 0.92); backdrop-filter: blur(12px);
            padding: 14px 24px; border-bottom: 1px solid var(--card);
            display: flex; align-items: center; justify-content: space-between;
        }
        header h1 { font-size: 1.3rem; color: var(--accent); }
        header p { font-size: 0.85rem; color: var(--dim); }
        .header-right { display: flex; gap: 16px; align-items: center; }
        .header-right span { font-size: 0.8rem; color: var(--dim); }

        #canvas-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; cursor: grab;
        }
        #canvas-container.grabbing { cursor: grabbing; }

        #world {
            position: absolute;
            transform-origin: 0 0;
        }

        svg#edges {
            position: absolute; top: 0; left: 0;
            pointer-events: none; overflow: visible;
        }
        svg#edges path { transition: stroke-opacity 0.3s, stroke-width 0.3s; }
        svg#edges text { pointer-events: none; }

        .node {
            position: absolute; border-radius: 12px; cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s, border-color 0.25s;
            border: 2px solid transparent;
            display: flex; align-items: center; justify-content: center;
            text-align: center; font-weight: 600; font-size: 0.88rem;
            user-select: none; z-index: 10;
        }
        .node:hover { transform: scale(1.08); z-index: 50; }

        .node .icon { font-size: 1.4rem; margin-bottom: 2px; display: block; }
        .node .label { display: block; line-height: 1.2; }

        .tooltip {
            position: fixed; width: min(360px, calc(100vw - 32px)); max-width: 360px;
            max-height: min(80vh, 520px); padding: 18px; border-radius: 12px;
            scrollbar-width: thin; scrollbar-color: var(--card) transparent;
            background: rgba(30, 41, 59, 0.98); backdrop-filter: blur(16px);
            border: 1px solid rgba(56, 189, 248, 0.35);
            box-shadow: 0 24px 64px rgba(0,0,0,0.55);
            opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
            z-index: 200; font-weight: 400;
            overflow-y: auto; overflow-x: hidden;
        }
        .tooltip.visible { opacity: 1; pointer-events: auto; }
        .tooltip h3 { color: var(--accent); margin-bottom: 10px; font-size: 1.05rem; line-height: 1.3; }
        .tooltip p { color: var(--dim); font-size: 0.9rem; margin: 5px 0; line-height: 1.55; }
        .tooltip .tag { display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 600; margin: 2px 2px 2px 0; }
        .tooltip ul { margin: 8px 0 8px 18px; color: var(--dim); font-size: 0.9rem; line-height: 1.5; }
        .tooltip ul li { margin: 4px 0; }
        .tooltip .divider { height: 1px; background: var(--card); margin: 12px 0; }
        .tooltip code { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: 0.85rem; color: var(--accent); font-family: 'Courier New', monospace; }
        .tooltip::-webkit-scrollbar { width: 8px; }
        .tooltip::-webkit-scrollbar-track { background: transparent; }
        .tooltip::-webkit-scrollbar-thumb { background: var(--card); border-radius: 4px; }

        .edge-label-hover {
            position: absolute; padding: 10px 14px; border-radius: 8px;
            background: rgba(30, 41, 59, 0.95); border: 1px solid var(--card);
            font-size: 0.82rem; color: var(--dim); white-space: nowrap;
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
            z-index: 150;
        }
        .edge-label-hover.visible { opacity: 1; }

        .legend {
            position: fixed; bottom: 16px; left: 16px; z-index: 100;
            background: rgba(30, 41, 59, 0.92); backdrop-filter: blur(12px);
            padding: 12px 16px; border-radius: 10px; border: 1px solid var(--card);
            font-size: 0.78rem; color: var(--dim);
        }
        .legend-row { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
        .legend-dot { width: 12px; height: 12px; border-radius: 3px; flex-shrink: 0; }

        .controls {
            position: fixed; bottom: 16px; right: 16px; z-index: 100;
            display: flex; gap: 8px;
        }
        .controls button {
            width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--card);
            background: rgba(30, 41, 59, 0.92); color: var(--text); font-size: 1.1rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(12px); transition: background 0.2s;
        }
        .controls button:hover { background: var(--card); }
    </style>
</head>
<body>

<header>
    <div>
        <h1>🍕 Hackapizza 2.0 — Knowledge Graph</h1>
        <p>Entity-Interaction Map &mdash; Hover on nodes and edges for details. Move mouse onto tooltip to read.</p>
    </div>
    <div class="header-right">
        <span>Scroll to zoom &middot; Drag to pan</span>
    </div>
</header>

<div id="canvas-container">
    <div id="world">
        <svg id="edges" width="1600" height="1100"></svg>
    </div>
</div>

<div class="tooltip" id="tooltip" aria-live="polite"></div>

<div class="legend">
    <div class="legend-row"><div class="legend-dot" style="background: var(--accent);"></div> Core System</div>
    <div class="legend-row"><div class="legend-dot" style="background: var(--warning);"></div> Resources</div>
    <div class="legend-row"><div class="legend-dot" style="background: var(--success);"></div> Production</div>
    <div class="legend-row"><div class="legend-dot" style="background: var(--purple);"></div> Demand / Clienti</div>
    <div class="legend-row"><div class="legend-dot" style="background: var(--orange);"></div> Outcomes</div>
    <div class="legend-row"><div class="legend-dot" style="background: var(--pink);"></div> Constraints</div>
</div>

<div class="controls">
    <button onclick="zoomIn()" title="Zoom in">+</button>
    <button onclick="zoomOut()" title="Zoom out">−</button>
    <button onclick="resetView()" title="Reset view">⌂</button>
</div>

<script>
const NODES = [
    {

        color: 'var(--accent)', bg: 'rgba(56,189,248,0.12)', border: 'rgba(56,189,248,0.5)',
        tooltip: {

    {

    {

            <ul>
                <li><code>create_market_entry</code> — BUY/SELL (broadcast a tutti)</li>
                <li><code>execute_transaction</code> — accetta offerta</li>
                <li><code>delete_market_entry</code> — ritira offerta</li>
            </ul>
            <p>Leggi: <code>GET /market/entries</code></p>`

    {

            <p><strong>Una ricetta definisce:</strong></p>

                <li>⭐ <strong>Prestigio</strong> del piatto</li>

            <p>Le ricette sono il ponte tra ingredienti e piatti. Scegli quelle che puoi sostenere con il tuo inventario!</p>
            <p>Endpoint: <code>GET /recipes</code> — array completo</p>`
        }
    },
    {

        x: 680, y: 700, w: 150, h: 62,
        color: 'var(--success)', bg: 'rgba(16,185,129,0.15)', border: 'rgba(16,185,129,0.6)',

            <p><strong>Ciclo di vita:</strong></p>

        }
    }
];

const EDGES = [
    { from: 'turno', to: 'ristorante', label: 'orchestra fasi', color: 'var(--accent)', dash: '6,4',

const world = document.getElementById('world');
const svgEdges = document.getElementById('edges');
const tooltipEl = document.getElementById('tooltip');
const container = document.getElementById('canvas-container');

let scale = 1, panX = 0, panY = 0;
let isDragging = false, dragStartX, dragStartY;

function createNodes() {
    NODES.forEach(n => {
        const el = document.createElement('div');
        el.className = 'node';
        el.id = 'node-' + n.id;
        el.style.left = (n.x - n.w/2) + 'px';
        el.style.top = (n.y - n.h/2) + 'px';
        el.style.width = n.w + 'px';
        el.style.height = n.h + 'px';
        el.style.background = n.bg;
        el.style.borderColor = n.border;
        el.style.color = n.color;
        if (n.id === 'ristorante') {
            el.style.boxShadow = '0 0 30px rgba(56,189,248,0.2)';
            el.style.fontSize = '0.95rem';
        }
        el.innerHTML = `<div><span class="icon">${n.icon}</span><span class="label">${n.label.replace(/\n/g, '<br/>')}</span></div>`;

        el.addEventListener('mouseenter', () => showTooltip(n, el));
        el.addEventListener('mouseleave', () => scheduleHideTooltip());
        world.appendChild(el);
    });
}

function getNodeCenter(id) {
    const n = NODES.find(n => n.id === id);
    return { x: n.x, y: n.y };
}

function getEdgePoints(fromId, toId) {
    const a = NODES.find(n => n.id === fromId);
    const b = NODES.find(n => n.id === toId);
    const ax = a.x, ay = a.y, bx = b.x, by = b.y;

    const angle = Math.atan2(by - ay, bx - ax);
    const hw_a = a.w / 2 + 4, hh_a = a.h / 2 + 4;
    const hw_b = b.w / 2 + 4, hh_b = b.h / 2 + 4;

    function borderPoint(cx, cy, hw, hh, ang) {
        const cos = Math.cos(ang), sin = Math.sin(ang);
        const sx = hw / Math.abs(cos || 0.001);
        const sy = hh / Math.abs(sin || 0.001);
        const s = Math.min(sx, sy);
        return { x: cx + cos * s, y: cy + sin * s };
    }

    const start = borderPoint(ax, ay, hw_a, hh_a, angle);
    const end = borderPoint(bx, by, hw_b, hh_b, angle + Math.PI);
    return { start, end };
}

function drawEdges() {
    svgEdges.innerHTML = '';
    const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');

    const colors = [...new Set(EDGES.map(e => e.color))];
    colors.forEach(c => {
        const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
        const cid = c.replace(/[^a-zA-Z0-9]/g, '');
        marker.setAttribute('id', 'arrow-' + cid);
        marker.setAttribute('viewBox', '0 0 10 10');
        marker.setAttribute('refX', '9'); marker.setAttribute('refY', '5');
        marker.setAttribute('markerWidth', '8'); marker.setAttribute('markerHeight', '8');
        marker.setAttribute('orient', 'auto-start-reverse');
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', 'M 0 1 L 10 5 L 0 9 z');
        path.setAttribute('fill', c);
        marker.appendChild(path);
        defs.appendChild(marker);
    });
    svgEdges.appendChild(defs);

    EDGES.forEach((e, i) => {
        const pts = getEdgePoints(e.from, e.to);
        const mx = (pts.start.x + pts.end.x) / 2;
        const my = (pts.start.y + pts.end.y) / 2;
        const dx = pts.end.x - pts.start.x;
        const dy = pts.end.y - pts.start.y;

        const offset = 0;
        const cx = mx + dy * 0.08 + offset;
        const cy = my - dx * 0.08 + offset;

        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.style.cursor = 'pointer';
        g.style.pointerEvents = 'auto';

        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', `M ${pts.start.x} ${pts.start.y} Q ${cx} ${cy} ${pts.end.x} ${pts.end.y}`);
        path.setAttribute('fill', 'none');
        path.setAttribute('stroke', e.color);
        path.setAttribute('stroke-width', '2');
        path.setAttribute('stroke-opacity', '0.5');
        const cid = e.color.replace(/[^a-zA-Z0-9]/g, '');
        path.setAttribute('marker-end', `url(#arrow-${cid})`);
        if (e.dash) path.setAttribute('stroke-dasharray', e.dash);
        g.appendChild(path);

        const hitPath = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        hitPath.setAttribute('d', `M ${pts.start.x} ${pts.start.y} Q ${cx} ${cy} ${pts.end.x} ${pts.end.y}`);
        hitPath.setAttribute('fill', 'none');
        hitPath.setAttribute('stroke', 'transparent');
        hitPath.setAttribute('stroke-width', '16');
        g.appendChild(hitPath);

        const labelX = (pts.start.x + 2*cx + pts.end.x) / 4;
        const labelY = (pts.start.y + 2*cy + pts.end.y) / 4;

        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', labelX);
        text.setAttribute('y', labelY - 6);
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('fill', e.color);
        text.setAttribute('font-size', '10');
        text.setAttribute('font-family', '-apple-system, sans-serif');
        text.setAttribute('opacity', '0.7');
        text.textContent = e.label;
        g.appendChild(text);

        g.addEventListener('mouseenter', () => {
            path.setAttribute('stroke-opacity', '1');
            path.setAttribute('stroke-width', '3.5');
            text.setAttribute('opacity', '1');
            text.setAttribute('font-size', '11.5');
            if (e.detail) showEdgeTooltip(e, labelX, labelY);
        });
        g.addEventListener('mouseleave', () => {
            path.setAttribute('stroke-opacity', '0.5');
            path.setAttribute('stroke-width', '2');
            text.setAttribute('opacity', '0.7');
            text.setAttribute('font-size', '10');
            hideEdgeTooltip();
        });

        svgEdges.appendChild(g);
    });
}

let edgeTooltipEl = null;
function showEdgeTooltip(e, x, y) {
    if (!edgeTooltipEl) {
        edgeTooltipEl = document.createElement('div');
        edgeTooltipEl.className = 'edge-label-hover';
        world.appendChild(edgeTooltipEl);
    }
    edgeTooltipEl.textContent = e.detail;
    edgeTooltipEl.style.maxWidth = '320px';
    edgeTooltipEl.style.whiteSpace = 'normal';
    edgeTooltipEl.style.left = (x + 12) + 'px';
    edgeTooltipEl.style.top = (y + 12) + 'px';
    edgeTooltipEl.classList.add('visible');
}
function hideEdgeTooltip() {
    if (edgeTooltipEl) edgeTooltipEl.classList.remove('visible');
}

let tooltipHideTimer = null;

function scheduleHideTooltip() {
    if (tooltipHideTimer) clearTimeout(tooltipHideTimer);
    tooltipHideTimer = setTimeout(hideTooltip, 180);
}

function cancelHideTooltip() {
    if (tooltipHideTimer) clearTimeout(tooltipHideTimer);
    tooltipHideTimer = null;
}

function showTooltip(node, nodeEl) {
    cancelHideTooltip();
    tooltipEl.innerHTML = `<h3>${node.tooltip.title}</h3>${node.tooltip.body}`;
    tooltipEl.classList.add('visible');

    requestAnimationFrame(() => positionTooltip(nodeEl));
}

function positionTooltip(nodeEl) {
    const rect = nodeEl.getBoundingClientRect();
    const tooltipW = Math.min(360, window.innerWidth - 24);
    const tooltipMaxH = Math.min(520, window.innerHeight - 80);
    const padding = 12;
    const gap = 6;
    const headerH = 56;

    let left = rect.right + gap;
    let top = rect.top;
    if (left + tooltipW > window.innerWidth - padding) left = rect.left - tooltipW - gap;
    if (left < padding) left = padding;
    if (top + tooltipMaxH > window.innerHeight - padding) top = window.innerHeight - tooltipMaxH - padding;
    if (top < headerH + padding) top = headerH + padding;

    tooltipEl.style.left = left + 'px';
    tooltipEl.style.top = top + 'px';
}

function hideTooltip() {
    tooltipEl.classList.remove('visible');
}

tooltipEl.addEventListener('mouseenter', cancelHideTooltip);
tooltipEl.addEventListener('mouseleave', () => { hideTooltip(); });

function updateTransform() {
    world.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
}

container.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 0.92 : 1.08;
    const newScale = Math.min(3, Math.max(0.3, scale * delta));
    const rect = container.getBoundingClientRect();
    const mx = e.clientX - rect.left;
    const my = e.clientY - rect.top;
    panX = mx - (mx - panX) * (newScale / scale);
    panY = my - (my - panY) * (newScale / scale);
    scale = newScale;
    updateTransform();
}, { passive: false });

container.addEventListener('mousedown', (e) => {
    if (e.target.closest('.node')) return;
    isDragging = true;
    dragStartX = e.clientX - panX;
    dragStartY = e.clientY - panY;
    container.classList.add('grabbing');
});
window.addEventListener('mousemove', (e) => {
    if (!isDragging) return;
    panX = e.clientX - dragStartX;
    panY = e.clientY - dragStartY;
    updateTransform();
});
window.addEventListener('mouseup', () => {
    isDragging = false;
    container.classList.remove('grabbing');
});

function zoomIn() { scale = Math.min(3, scale * 1.2); updateTransform(); }
function zoomOut() { scale = Math.max(0.3, scale * 0.83); updateTransform(); }
function resetView() {
    const rect = container.getBoundingClientRect();
    const graphW = 1400, graphH = 1000;
    scale = Math.min((rect.width - 40) / graphW, (rect.height - 100) / graphH, 1);
    panX = (rect.width - graphW * scale) / 2;
    panY = (rect.height - graphH * scale) / 2 + 20;
    updateTransform();
}

createNodes();
drawEdges();

window.addEventListener('load', resetView);
window.addEventListener('resize', resetView);
</script>
